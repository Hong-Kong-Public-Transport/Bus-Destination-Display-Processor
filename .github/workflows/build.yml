name: Build
on: [ pull_request, push, workflow_dispatch, workflow_call ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@main
        with:
          repository: Hong-Kong-Public-Transport/Bus-Destination-Display-Processor
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@main
      - name: Setup JDK 21
        uses: actions/setup-java@main
        with:
          java-version: 21
          distribution: 'microsoft'
          cache: gradle
      - name: Make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: Build JAR
        run: ./gradlew shadowJar --no-daemon
      - name: Upload JAR
        uses: actions/upload-artifact@main
        with:
          name: Artifact
          path: build/libs/Bus-Destination-Display-Processor-*-all.jar
